name: FairyDesk
options:
  bundleIdPrefix: com.fairydesk
  deploymentTarget:
    macOS: "13.0"
  minimumXcodeGenVersion: "2.35.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  FairyDesk:
    type: application
    platform: macOS
    sources:
      - path: FairyDesk
    resources:
      - path: FairyDesk/Assets.xcassets
    info:
      path: FairyDesk/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Wisp
    entitlements:
      path: FairyDesk/FairyDesk.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_NAME: Wisp
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        PRODUCT_BUNDLE_IDENTIFIER: com.wisp.app
        INFOPLIST_FILE: FairyDesk/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

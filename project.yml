name: FairyDesk
options:
  bundleIdPrefix: com.fairydesk
  deploymentTarget:
    macOS: "13.0"
  minimumXcodeGenVersion: "2.35.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.0.0"

targets:
  FairyDesk:
    type: application
    platform: macOS
    sources:
      - path: Wisp
    resources:
      - path: Wisp/Assets.xcassets
    info:
      path: Wisp/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Wisp
        SUFeedURL: "https://wisp.gruffix.ru/appcast.xml"
        SUEnableAutomaticChecks: true
        SUPublicEDKey: "HfeiC9J2JUQFerjkq/c/U5lQsFFaBoTzFGpe7bxtoy4="
    entitlements:
      path: Wisp/Wisp.entitlements
      properties:
        com.apple.security.app-sandbox: false
    dependencies:
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_NAME: Wisp
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        PRODUCT_BUNDLE_IDENTIFIER: com.wisp.app
        INFOPLIST_FILE: Wisp/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
